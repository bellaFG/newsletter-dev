name: DevPulse Weekly Newsletter

on:
  # Segunda-feira 07:00 BRT: prepara rascunho
  # Segunda-feira 07:30 BRT: verifica se o rascunho esta pronto
  # Segunda-feira 08:00 BRT: publica no site e envia emails
  schedule:
    - cron: "0 10 * * 1"
    - cron: "30 10 * * 1"
    - cron: "0 11 * * 1"

  # Permite disparar manualmente pelo GitHub (útil para testes)
  workflow_dispatch:
    inputs:
      mode:
        description: Modo do pipeline
        required: true
        default: full
        type: choice
        options:
          - full
          - prepare
          - check-ready
          - publish

jobs:
  prepare-draft:
    name: Prepare Draft
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'prepare')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes

      - name: Prepare draft
        id: prepare_draft
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_API_SECRET: ${{ secrets.NEWSLETTER_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
        run: python -m pipeline.main prepare --notify-on-success --notify-on-failure

      - name: Notify Discord if job failed before pipeline alert
        if: ${{ failure() && steps.prepare_draft.outcome != 'failure' }}
        env:
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
          DISCORD_TITLE: DevPulse falhou antes de preparar o rascunho
          DISCORD_BODY: O job das 07:00 BRT falhou antes de o pipeline Python conseguir enviar o alerta interno. Verifique setup do Actions, secrets, Supabase CLI ou migrations.
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_ALERT_WEBHOOK_URL" ]; then
            echo "DISCORD_ALERT_WEBHOOK_URL ausente; alerta nao enviado"
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          content = (
              f"**{os.environ['DISCORD_TITLE']}**\n"
              f"{os.environ['DISCORD_BODY']}\n\n"
              f"GitHub Actions: {os.environ['GITHUB_RUN_URL']}"
          )
          request = urllib.request.Request(
              os.environ["DISCORD_ALERT_WEBHOOK_URL"],
              data=json.dumps({"content": content}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY

  check-ready:
    name: Check Draft Readiness
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 10 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'check-ready')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes

      - name: Check draft readiness
        id: check_ready
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
        run: python -m pipeline.main check-ready --notify-on-success --notify-on-failure

      - name: Notify Discord if job failed before pipeline alert
        if: ${{ failure() && steps.check_ready.outcome != 'failure' }}
        env:
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
          DISCORD_TITLE: DevPulse nao ficou pronto ate 07:30 BRT
          DISCORD_BODY: A checagem das 07:30 BRT falhou antes de o pipeline Python conseguir enviar o alerta interno. Se nao houver rascunho preparado, a publicacao das 08:00 BRT fica bloqueada. Verifique setup do Actions, secrets, Supabase CLI ou migrations.
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_ALERT_WEBHOOK_URL" ]; then
            echo "DISCORD_ALERT_WEBHOOK_URL ausente; alerta nao enviado"
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          content = (
              f"**{os.environ['DISCORD_TITLE']}**\n"
              f"{os.environ['DISCORD_BODY']}\n\n"
              f"GitHub Actions: {os.environ['GITHUB_RUN_URL']}"
          )
          request = urllib.request.Request(
              os.environ["DISCORD_ALERT_WEBHOOK_URL"],
              data=json.dumps({"content": content}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY

  publish-newsletter:
    name: Publish Newsletter
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'publish')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes

      - name: Publish newsletter
        id: publish_newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_API_SECRET: ${{ secrets.NEWSLETTER_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
        run: python -m pipeline.main publish --notify-on-success --notify-on-failure

      - name: Notify Discord if job failed before pipeline alert
        if: ${{ failure() && steps.publish_newsletter.outcome != 'failure' }}
        env:
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
          DISCORD_TITLE: DevPulse falhou na publicacao das 08:00 BRT
          DISCORD_BODY: O job das 08:00 BRT falhou antes de o pipeline Python conseguir enviar o alerta interno. Verifique setup do Actions, secrets, Supabase CLI ou migrations.
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_ALERT_WEBHOOK_URL" ]; then
            echo "DISCORD_ALERT_WEBHOOK_URL ausente; alerta nao enviado"
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          content = (
              f"**{os.environ['DISCORD_TITLE']}**\n"
              f"{os.environ['DISCORD_BODY']}\n\n"
              f"GitHub Actions: {os.environ['GITHUB_RUN_URL']}"
          )
          request = urllib.request.Request(
              os.environ["DISCORD_ALERT_WEBHOOK_URL"],
              data=json.dumps({"content": content}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY

  full-pipeline:
    name: Run Full Pipeline
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --yes

      - name: Run full pipeline
        id: full_pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          NEWSLETTER_API_SECRET: ${{ secrets.NEWSLETTER_API_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
        run: python -m pipeline.main full --notify-on-success --notify-on-failure

      - name: Notify Discord if job failed before pipeline alert
        if: ${{ failure() && steps.full_pipeline.outcome != 'failure' }}
        env:
          DISCORD_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_ALERT_WEBHOOK_URL }}
          DISCORD_TITLE: DevPulse falhou antes de rodar o pipeline completo
          DISCORD_BODY: O job manual do pipeline completo falhou antes de o pipeline Python conseguir enviar o alerta interno. Verifique setup do Actions, secrets, Supabase CLI ou migrations.
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_ALERT_WEBHOOK_URL" ]; then
            echo "DISCORD_ALERT_WEBHOOK_URL ausente; alerta nao enviado"
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          content = (
              f"**{os.environ['DISCORD_TITLE']}**\n"
              f"{os.environ['DISCORD_BODY']}\n\n"
              f"GitHub Actions: {os.environ['GITHUB_RUN_URL']}"
          )
          request = urllib.request.Request(
              os.environ["DISCORD_ALERT_WEBHOOK_URL"],
              data=json.dumps({"content": content}).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          urllib.request.urlopen(request, timeout=15).read()
          PY
