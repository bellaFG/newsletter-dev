name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-web:
    name: Validate Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Astro checks
        run: npm run lint

      - name: Build Astro app
        run: npm run build

  validate-pipeline:
    name: Validate Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile pipeline modules
        run: python -m compileall pipeline
